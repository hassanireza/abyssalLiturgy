<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12151c"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8f92"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="url(#bg2)"/>

  <text x="450" y="40" text-anchor="middle" fill="#e8e4da" font-family="Georgia, serif" font-style="italic" font-size="20">App</text>
  <rect x="380" y="55" width="140" height="44" rx="4" fill="none" stroke="#e8e4da" stroke-width="1.25"/>
  <text x="450" y="82" text-anchor="middle" fill="#e8e4da" font-family="Arial, sans-serif" font-size="12" letter-spacing="1">App.tsx</text>

  <line x1="450" y1="99" x2="140" y2="150" stroke="#8a8f92" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="450" y1="99" x2="320" y2="150" stroke="#8a8f92" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="450" y1="99" x2="560" y2="150" stroke="#8a8f92" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="450" y1="99" x2="760" y2="150" stroke="#8a8f92" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Hero -->
  <g>
    <rect x="70" y="155" width="140" height="60" rx="4" fill="none" stroke="#8a8f92" stroke-width="1"/>
    <text x="140" y="180" text-anchor="middle" fill="#e8e4da" font-family="Arial, sans-serif" font-size="12">Hero.tsx</text>
    <text x="140" y="198" text-anchor="middle" fill="#55595c" font-family="Arial, sans-serif" font-size="9" letter-spacing="1">random video</text>
  </g>

  <!-- Nav -->
  <g>
    <rect x="250" y="155" width="140" height="60" rx="4" fill="none" stroke="#8a8f92" stroke-width="1"/>
    <text x="320" y="180" text-anchor="middle" fill="#e8e4da" font-family="Arial, sans-serif" font-size="12">Nav.tsx</text>
    <text x="320" y="198" text-anchor="middle" fill="#55595c" font-family="Arial, sans-serif" font-size="9" letter-spacing="1">scrollspy</text>
  </g>

  <!-- GuideSection -->
  <g>
    <rect x="490" y="155" width="160" height="60" rx="4" fill="none" stroke="#8a8f92" stroke-width="1"/>
    <text x="570" y="180" text-anchor="middle" fill="#e8e4da" font-family="Arial, sans-serif" font-size="12">GuideSection.tsx</text>
    <text x="570" y="198" text-anchor="middle" fill="#55595c" font-family="Arial, sans-serif" font-size="9" letter-spacing="1">x6, one per method</text>
  </g>

  <!-- GrainOverlay -->
  <g>
    <rect x="690" y="155" width="140" height="60" rx="4" fill="none" stroke="#8a8f92" stroke-width="1"/>
    <text x="760" y="180" text-anchor="middle" fill="#e8e4da" font-family="Arial, sans-serif" font-size="12">GrainOverlay.tsx</text>
    <text x="760" y="198" text-anchor="middle" fill="#55595c" font-family="Arial, sans-serif" font-size="9" letter-spacing="1">film grain</text>
  </g>

  <line x1="570" y1="215" x2="570" y2="255" stroke="#8a8f92" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- FrameSequence -->
  <g>
    <rect x="490" y="260" width="160" height="60" rx="4" fill="none" stroke="#e8e4da" stroke-width="1.25"/>
    <text x="570" y="285" text-anchor="middle" fill="#e8e4da" font-family="Arial, sans-serif" font-size="12">FrameSequence.tsx</text>
    <text x="570" y="303" text-anchor="middle" fill="#55595c" font-family="Arial, sans-serif" font-size="9" letter-spacing="1">sticky canvas scrub</text>
  </g>

  <line x1="570" y1="320" x2="570" y2="360" stroke="#8a8f92" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- data source -->
  <g>
    <rect x="490" y="365" width="160" height="45" rx="4" fill="none" stroke="#55595c" stroke-width="1"/>
    <text x="570" y="393" text-anchor="middle" fill="#8a8f92" font-family="Arial, sans-serif" font-size="11">public/frames/&lt;slug&gt;</text>
  </g>

  <line x1="320" y1="215" x2="320" y2="255" stroke="#8a8f92" stroke-width="1" marker-end="url(#arrow2)"/>
  <g>
    <rect x="240" y="260" width="160" height="45" rx="4" fill="none" stroke="#55595c" stroke-width="1"/>
    <text x="320" y="288" text-anchor="middle" fill="#8a8f92" font-family="Arial, sans-serif" font-size="11">content/guides.ts</text>
  </g>

  <text x="450" y="20" text-anchor="middle" fill="#55595c" font-family="Arial, sans-serif" font-size="11" letter-spacing="2">COMPONENT TREE</text>
</svg>
